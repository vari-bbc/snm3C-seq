name: mapping
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.8
  - pip
  - jupyter
  - jupyterlab_code_formatter
  - cutadapt
  - snakemake=7.32.4
  - bismark=0.20
  - samtools=1.15
  - picard=2.27.5
  - bedtools=2.31.1
  - star=2.7.3a
  - subread=2.0
  - hisat-3n=0.0.3
  - bowtie2
  - bowtie
  - htslib=1.15
  - pysam=0.19
  - pybedtools=0.10.0
  - pybigwig
  - pytables
  - seaborn
  - matplotlib
  - pip:
    - papermill
    - cemba-data
    - allcools
